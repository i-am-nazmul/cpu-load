<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EC2 CPU Load Control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">EC2 CPU control panel</p>
        <h1>Drive and observe the two cores from one dashboard.</h1>
        <p class="lede">
          Start a controllable CPU burn on both workers, watch the utilization update in real time, and stop the load when you are done.
        </p>
      </section>

      <section class="panel controls">
        <div class="status-row">
          <div>
            <span class="label">Load state</span>
            <strong id="loadState">Idle</strong>
          </div>
          <div>
            <span class="label">Workers</span>
            <strong id="workerCount">2</strong>
          </div>
          <div>
            <span class="label">Total CPU</span>
            <strong id="totalCpu">0.0%</strong>
          </div>
        </div>

        <div class="button-row">
          <button id="startBtn" class="primary">Increase CPU load</button>
          <button id="stopBtn" class="secondary">Stop load</button>
        </div>
      </section>

      <section class="panel meters">
        <div class="panel-header">
          <h2>Per-core utilization</h2>
          <span>Live sampling from the instance</span>
        </div>
        <div id="coreMeters" class="meter-grid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
