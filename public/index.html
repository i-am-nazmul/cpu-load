<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EC2 CPU Load Control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">EC2 CPU control panel</p>
        <h1>Increase the load of a server.</h1>
        <p class="lede">
          Start a controllable CPU load on the server, watch the utilization update in real time, and stop it when you are done.
        </p>
        <p class="lede">
          Server ID: <strong id="instanceIdDisplay">Loading...</strong>
        </p>
      </section>

      <section class="panel controls">
        <div class="button-row">
          <button id="startBtn" class="primary">Increase CPU load</button>
          <button id="stopBtn" class="secondary">Stop load</button>
        </div>
      </section>

      <section class="panel meters">
        <div class="panel-header">
          <h2>Per-core utilization</h2>
          <span>Live sampling from the instance</span>
        </div>
        <div id="coreMeters" class="meter-grid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
